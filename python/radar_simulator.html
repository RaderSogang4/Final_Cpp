<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Track Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@300;500;700;800&display=swap');

  :root {
    --bg: #06080c;
    --panel: rgba(8, 14, 24, 0.88);
    --border: rgba(0, 200, 160, 0.12);
    --accent: #00c8a0;
    --accent2: #3b82f6;
    --warn: #f59e0b;
    --err: #ef4444;
    --text: #c8d6e5;
    --dim: #4a5e73;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  canvas#c {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
  }

  /* ── panels ── */
  .p {
    position: fixed;
    z-index: 10;
    background: var(--panel);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    line-height: 1.6;
  }

  /* top-left: title + connection */
  .p-title {
    top: 14px; left: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .p-title h1 {
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 15px;
    letter-spacing: 1.2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.ok   { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
  .dot.wait { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: blink 1s infinite; }
  .dot.err  { background: var(--err); box-shadow: 0 0 6px var(--err); }
  @keyframes blink { 50% { opacity: .3; } }

  .conn-label { color: var(--dim); font-size: 10.5px; }

  /* top-right: stats */
  .p-stats { top: 14px; right: 14px; min-width: 180px; }
  .stat { display: flex; justify-content: space-between; padding: 1px 0; }
  .stat-k { color: var(--dim); }
  .stat-v { color: var(--accent); font-weight: 600; }

  /* bottom-left: controls */
  .p-ctrl { bottom: 14px; left: 14px; width: 310px; }
  .p-ctrl h3 {
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 11px;
    color: var(--accent); text-transform: uppercase;
    letter-spacing: 1.8px; margin-bottom: 8px;
  }
  .cr {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 6px;
  }
  .cr label { color: var(--dim); font-size: 10.5px; }
  .cr input[type=range] { width: 130px; accent-color: var(--accent); }
  .cr .v { color: var(--accent); min-width: 32px; text-align: right; font-size: 10.5px; }

  .cr input[type=text] {
    background: rgba(0,200,160,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    width: 180px;
  }

  .btn {
    background: rgba(0,200,160,0.08);
    border: 1px solid rgba(0,200,160,0.25);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { background: rgba(0,200,160,0.2); border-color: var(--accent); }
  .btn-row { display: flex; gap: 6px; margin-top: 10px; }

  /* bottom-right: track list */
  .p-tracks { bottom: 14px; right: 14px; width: 260px; max-height: 320px; overflow-y: auto; }
  .p-tracks h3 {
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 11px;
    color: var(--accent); text-transform: uppercase;
    letter-spacing: 1.8px; margin-bottom: 8px;
  }
  .te {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(0,200,160,0.05);
    font-size: 10.5px;
  }
  .tc { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ti { color: var(--accent); min-width: 36px; }
  .tp { color: var(--dim); }

  /* log overlay */
  .p-log {
    top: 60px; left: 14px; width: 380px; max-height: 200px;
    overflow-y: auto; font-size: 10px; color: var(--dim);
    display: none;
  }
  .p-log.show { display: block; }
  .p-log .l { padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-log .l.ok { color: #22c55e; }
  .p-log .l.w  { color: var(--warn); }
  .p-log .l.e  { color: var(--err); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- Title / connection -->
<div class="p p-title">
  <div class="dot wait" id="dot"></div>
  <h1>RADAR TRACK VIEWER</h1>
  <span class="conn-label" id="connLabel">연결 대기...</span>
</div>

<!-- Stats -->
<div class="p p-stats">
  <div class="stat"><span class="stat-k">Frame</span><span class="stat-v" id="sFrame">—</span></div>
  <div class="stat"><span class="stat-k">Tracks</span><span class="stat-v" id="sTracks">0</span></div>
  <div class="stat"><span class="stat-k">Packets/s</span><span class="stat-v" id="sPps">0</span></div>
  <div class="stat"><span class="stat-k">FPS</span><span class="stat-v" id="sFps">0</span></div>
</div>

<!-- Controls -->
<div class="p p-ctrl">
  <h3>Settings</h3>
  <div class="cr">
    <label>WS URL</label>
    <input type="text" id="wsUrl" value="ws://127.0.0.1:8765">
  </div>
  <div class="cr">
    <label>Sphere Size</label>
    <input type="range" id="rSize" min="0.05" max="0.8" step="0.01" value="0.25">
    <span class="v" id="vSize">0.25</span>
  </div>
  <div class="cr">
    <label>Lerp Speed</label>
    <input type="range" id="rLerp" min="1" max="30" step="1" value="10">
    <span class="v" id="vLerp">10</span>
  </div>
  <div class="cr">
    <label>Trail Length</label>
    <input type="range" id="rTrail" min="0" max="120" step="1" value="30">
    <span class="v" id="vTrail">30</span>
  </div>
  <div class="cr">
    <label>Timeout (s)</label>
    <input type="range" id="rTimeout" min="1" max="15" step="0.5" value="5">
    <span class="v" id="vTimeout">5.0</span>
  </div>
  <div class="btn-row">
    <button class="btn" id="btnConnect">Connect</button>
    <button class="btn" id="btnLog">Toggle Log</button>
    <button class="btn" id="btnReset">Reset View</button>
  </div>
</div>

<!-- Track list -->
<div class="p p-tracks">
  <h3>Active Tracks</h3>
  <div id="trackList"></div>
</div>

<!-- Log -->
<div class="p p-log" id="logPanel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
//  Three.js scene
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06080c, 0.03);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);

// lights
scene.add(new THREE.AmbientLight(0x223344, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.7);
dir.position.set(4, 10, 6); dir.castShadow = true;
scene.add(dir);
scene.add(new THREE.PointLight(0x00c8a0, 0.3, 40));

// ground
const gridH = new THREE.GridHelper(24, 48, 0x0e1e2e, 0x0a151f);
scene.add(gridH);

// axes
const axC = [0xff4444, 0x44ff44, 0x4488ff];
[[1,0,0],[0,1,0],[0,0,1]].forEach((d,i) => {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(), new THREE.Vector3(...d).multiplyScalar(1.5)
  ]);
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: axC[i] })));
});

// ═══════════════════════════════════════
//  Track visuals
// ═══════════════════════════════════════
const COLORS = [
  0xff6b6b, 0x51cf66, 0x339af0, 0xfcc419, 0xcc5de8,
  0x20c997, 0xff922b, 0x845ef7, 0xf06595, 0x22b8cf,
  0x5c7cfa, 0x94d82d, 0xffd43b, 0xe64980, 0x12b886,
];

class TrackVis {
  constructor(id) {
    this.id = id;
    this.color = COLORS[Math.abs(id) % COLORS.length];
    this.targetPos = new THREE.Vector3();
    this.currentPos = new THREE.Vector3();
    this.lastSeen = performance.now();
    this.trail = [];

    // sphere
    const geo = new THREE.SphereGeometry(1, 24, 24);
    const mat = new THREE.MeshStandardMaterial({
      color: this.color, emissive: this.color, emissiveIntensity: 0.3,
      metalness: 0.3, roughness: 0.4,
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.castShadow = true;
    scene.add(this.mesh);

    // ground ring
    const rg = new THREE.RingGeometry(1.15, 1.4, 32);
    const rm = new THREE.MeshBasicMaterial({ color: this.color, transparent: true, opacity: 0.18, side: THREE.DoubleSide });
    this.ring = new THREE.Mesh(rg, rm);
    this.ring.rotation.x = -Math.PI / 2;
    scene.add(this.ring);

    // vertical line to ground
    const lg = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,-1,0)]);
    this.vLine = new THREE.Line(lg, new THREE.LineBasicMaterial({ color: this.color, transparent: true, opacity: 0.15 }));
    scene.add(this.vLine);

    // trail
    this.trailGeo = new THREE.BufferGeometry();
    this.trailLine = new THREE.Line(this.trailGeo, new THREE.LineBasicMaterial({ color: this.color, transparent: true, opacity: 0.35 }));
    scene.add(this.trailLine);

    // label
    this.label = this._makeLabel(`ID ${id}`);
    scene.add(this.label);
  }

  _makeLabel(text) {
    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 48;
    const ctx = cv.getContext('2d');
    ctx.font = 'bold 26px IBM Plex Mono, monospace';
    ctx.fillStyle = '#' + new THREE.Color(this.color).getHexString();
    ctx.textAlign = 'center';
    ctx.fillText(text, 64, 32);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85 });
    const s = new THREE.Sprite(mat);
    s.scale.set(1, 0.4, 1);
    return s;
  }

  setTarget(x, y, z) {
    // radar_tcp_sender: float x, y, z  (radar coords)
    // Unity에서 X,Z,Y 스왑하는 것처럼 여기서도 동일 적용
    this.targetPos.set(x, z, y);
    this.lastSeen = performance.now();
  }

  update(dt, sphereSize, lerpSpeed, trailLen) {
    // lerp toward target
    const alpha = Math.min(1, lerpSpeed * dt);
    this.currentPos.lerp(this.targetPos, alpha);

    this.mesh.position.copy(this.currentPos);
    this.mesh.position.y = Math.max(this.currentPos.y, sphereSize);
    this.mesh.scale.setScalar(sphereSize);

    this.ring.position.set(this.currentPos.x, 0.01, this.currentPos.z);
    this.ring.scale.setScalar(sphereSize);

    this.vLine.position.copy(this.mesh.position);
    const vlPts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0, -(this.mesh.position.y - 0.01), 0)];
    this.vLine.geometry.setFromPoints(vlPts);

    this.label.position.set(this.currentPos.x, this.mesh.position.y + sphereSize + 0.35, this.currentPos.z);

    // trail
    this.trail.push(this.mesh.position.clone().setY(0.02));
    while (this.trail.length > trailLen) this.trail.shift();
    if (this.trail.length > 1) this.trailGeo.setFromPoints(this.trail);
  }

  dispose() {
    [this.mesh, this.ring, this.vLine, this.trailLine, this.label].forEach(o => scene.remove(o));
    this.mesh.geometry.dispose(); this.mesh.material.dispose();
    this.ring.geometry.dispose(); this.ring.material.dispose();
    this.vLine.geometry.dispose(); this.vLine.material.dispose();
    this.trailGeo.dispose(); this.trailLine.material.dispose();
    this.label.material.dispose(); this.label.material.map.dispose();
  }
}

// ═══════════════════════════════════════
//  State
// ═══════════════════════════════════════
const trackVis = {};          // id → TrackVis
let wsFrame = 0;
let pktTimestamps = [];
let fpsArr = [];
let ws = null;
let wsConnected = false;

// ═══════════════════════════════════════
//  WebSocket
// ═══════════════════════════════════════
function connectWS() {
  const url = document.getElementById('wsUrl').value;
  if (ws) { try { ws.close(); } catch(e){} }

  log('연결 시도: ' + url, 'w');
  setConn('wait', '연결 중...');

  ws = new WebSocket(url);

  ws.onopen = () => {
    wsConnected = true;
    setConn('ok', '연결됨');
    log('WebSocket 연결 성공', 'ok');
  };

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleFrame(msg);
    } catch (e) {
      log('파싱 에러: ' + e.message, 'e');
    }
  };

  ws.onclose = () => {
    wsConnected = false;
    setConn('err', '연결 끊김');
    log('WebSocket 닫힘 — 3초 후 재연결', 'w');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    log('WebSocket 에러', 'e');
  };
}

function handleFrame(msg) {
  wsFrame = msg.frame || wsFrame + 1;
  pktTimestamps.push(performance.now());

  const seenIds = new Set();

  for (const t of msg.tracks) {
    seenIds.add(t.id);
    if (!trackVis[t.id]) {
      trackVis[t.id] = new TrackVis(t.id);
      log(`트랙 생성: ID ${t.id}`, 'ok');
    }
    trackVis[t.id].setTarget(t.x, t.y, t.z);
  }
}

function setConn(cls, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + cls;
  document.getElementById('connLabel').textContent = text;
}

// ═══════════════════════════════════════
//  Logging
// ═══════════════════════════════════════
const logLines = [];
function log(msg, cls) {
  logLines.push({ msg, cls: cls || '' });
  if (logLines.length > 80) logLines.shift();
  const el = document.getElementById('logPanel');
  el.innerHTML = logLines.map(l =>
    `<div class="l ${l.cls}">[${new Date().toLocaleTimeString()}] ${l.msg}</div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
}

// ═══════════════════════════════════════
//  Controls
// ═══════════════════════════════════════
['rSize','rLerp','rTrail','rTimeout'].forEach(id => {
  const el = document.getElementById(id);
  const vEl = document.getElementById('v' + id.charAt(1).toUpperCase() + id.slice(2));
  el.addEventListener('input', () => {
    const val = parseFloat(el.value);
    vEl.textContent = id === 'rTimeout' ? val.toFixed(1) : (id === 'rSize' ? val.toFixed(2) : val);
  });
});

document.getElementById('btnConnect').addEventListener('click', connectWS);
document.getElementById('btnLog').addEventListener('click', () => {
  document.getElementById('logPanel').classList.toggle('show');
});
document.getElementById('btnReset').addEventListener('click', () => {
  camAngle = 0.8; camPitch = 0.55; camDist = 14;
});

// ═══════════════════════════════════════
//  Camera orbit
// ═══════════════════════════════════════
let camAngle = 0.8, camPitch = 0.55, camDist = 14;
let dragging = false, lmx, lmy;

canvas.addEventListener('mousedown', e => { dragging = true; lmx = e.clientX; lmy = e.clientY; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  camAngle -= (e.clientX - lmx) * 0.005;
  camPitch = Math.max(0.08, Math.min(1.45, camPitch + (e.clientY - lmy) * 0.005));
  lmx = e.clientX; lmy = e.clientY;
});
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);
canvas.addEventListener('wheel', e => { camDist = Math.max(3, Math.min(40, camDist + e.deltaY * 0.012)); });

canvas.addEventListener('touchstart', e => { if (e.touches.length===1) { dragging=true; lmx=e.touches[0].clientX; lmy=e.touches[0].clientY; }});
canvas.addEventListener('touchmove', e => {
  if (!dragging||e.touches.length!==1) return;
  camAngle -= (e.touches[0].clientX-lmx)*0.005;
  camPitch = Math.max(0.08, Math.min(1.45, camPitch+(e.touches[0].clientY-lmy)*0.005));
  lmx=e.touches[0].clientX; lmy=e.touches[0].clientY;
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', () => dragging=false);

// ═══════════════════════════════════════
//  Render loop
// ═══════════════════════════════════════
let lastT = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastT) / 1000, 0.1);
  lastT = now;

  const sphereSize = parseFloat(document.getElementById('rSize').value);
  const lerpSpeed  = parseFloat(document.getElementById('rLerp').value);
  const trailLen   = parseInt(document.getElementById('rTrail').value);
  const timeout    = parseFloat(document.getElementById('rTimeout').value) * 1000;

  // update & timeout
  const nowMs = performance.now();
  const deadIds = [];
  for (const [id, tv] of Object.entries(trackVis)) {
    if (nowMs - tv.lastSeen > timeout) {
      deadIds.push(id);
    } else {
      tv.update(dt, sphereSize, lerpSpeed, trailLen);
    }
  }
  deadIds.forEach(id => {
    trackVis[id].dispose();
    delete trackVis[id];
    log(`트랙 삭제 (timeout): ID ${id}`, 'w');
  });

  // camera
  if (!dragging) camAngle += dt * 0.04;
  camera.position.set(
    Math.cos(camAngle) * Math.cos(camPitch) * camDist,
    Math.sin(camPitch) * camDist,
    Math.sin(camAngle) * Math.cos(camPitch) * camDist,
  );
  camera.lookAt(0, 0, 0);

  // fps
  fpsArr.push(1 / (dt || 0.016));
  if (fpsArr.length > 30) fpsArr.shift();
  const fps = Math.round(fpsArr.reduce((a,b)=>a+b) / fpsArr.length);

  // pps
  const cutoff = nowMs - 1000;
  pktTimestamps = pktTimestamps.filter(t => t > cutoff);

  // stats UI
  document.getElementById('sFrame').textContent = wsFrame || '—';
  document.getElementById('sTracks').textContent = Object.keys(trackVis).length;
  document.getElementById('sPps').textContent = pktTimestamps.length;
  document.getElementById('sFps').textContent = fps;

  // track list (throttled)
  if (Math.round(now) % 6 < 2) {
    const el = document.getElementById('trackList');
    const entries = Object.values(trackVis).sort((a,b) => a.id - b.id);
    el.innerHTML = entries.map(tv => {
      const hex = '#' + new THREE.Color(tv.color).getHexString();
      const p = tv.currentPos;
      return `<div class="te">
        <div class="tc" style="background:${hex};box-shadow:0 0 5px ${hex}"></div>
        <span class="ti">ID ${tv.id}</span>
        <span class="tp">(${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})</span>
      </div>`;
    }).join('');
  }

  renderer.render(scene, camera);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// auto-connect on load
connectWS();
animate(performance.now());
</script>
</body>
</html>
